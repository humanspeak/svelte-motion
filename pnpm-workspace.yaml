packages:
    - .
    - docs
allowBuilds:
    '@humanspeak/docs-kit': true
    esbuild: true
    sharp: true
    workerd: true
minimumReleaseAge: 2880
minimumReleaseAgeExclude:
    - '@humanspeak/*'
    - '@vitest/browser@4.1.8'
    - '@vitest/coverage-v8@4.1.8'
    - '@vitest/expect@4.1.8'
    - '@vitest/mocker@4.1.8'
    - '@vitest/pretty-format@4.1.8'
    - '@vitest/runner@4.1.8'
    - '@vitest/snapshot@4.1.8'
    - '@vitest/spy@4.1.8'
    - '@vitest/utils@4.1.8'
    - prettier-plugin-svelte@4.1.0
    - svelte-check@4.5.0
    - vite@8.0.16
    - vitest@4.1.8
